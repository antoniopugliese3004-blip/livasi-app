        const isCanvas = typeof __firebase_config !== 'undefined';

        ];

        const CONDITIONS_IT = [{t:"Nel ringraziarVi dell’interesse verso i nostri prodotti, sottoponiamo alla Vostra cortese attenzione la nostra offerta.",b:false},{t:"1. IL NOSTRO SERVIZIO",b:true},{t:"Il salumificio Livasì si impegna a fornire i suoi prodotti nel rispetto nei tempi e nelle modalità indicate nel presente documento. Tutti i nostri salumi subiscono una fase di affumicatura con legno di ulivo e quercia. Per tutti i prodotti vengono rispettati i tempi di stagionatura stabiliti dal know-how aziendale.",b:false},{t:"2. Modalità di invio ordine",b:true},{t:"Gli ordini potranno pervenire via email ai seguenti indirizzi:\n- amministrazione@livasi.com\n- commerciale@livasi.com\no via whatsapp al numero:\n- +39 0963582222\nI nostri operatori risponderanno nel più breve tempo possibile.",b:false},{t:"3. Tempi di evasione ordine",b:true},{t:"In condizioni normali dalla ricezione dell’ordine questo viene preparato in 1/2gg lavorativi. Spedizioni dal lunedì al mercoledì con tempi di consegna standard di 2gg lavorativi nel territorio italiano.",b:false},{t:"4. Costi di spedizioni",b:true},{t:"Per gli ordini superiore ai 30kg di merce la spedizione è gratuita solo per consegna in Italia. Per carichi inferiori o estero, il costo è calcolato in fattura.",b:false},{t:"5. Modalità di pagamento",b:true},{t:"- Bonifico anticipato (la merce verrà spedita solo dopo la verifica di incasso pagamento)",b:false},{t:"6. Obblighi alla ricezione della merce",b:true},{t:"Accettare con riserva di controllo. Segnalare eventuali danni immediatamente sul documento del corriere e scattare foto. Non si accettano reclami senza riserva firmata.",b:false}];
        const CONDITIONS_EN = [{t:"Thank you for your interest in our products, we submit our offer for your kind attention.",b:false},{t:"1. OUR SERVICE",b:true},{t:"Salumificio Livasì is committed to providing its products according to the times and methods indicated in this document. All our cured meats undergo a smoking phase with olive and oak wood. For all products, seasoning times established by company know-how are respected.",b:false},{t:"2. Order Submission",b:true},{t:"Orders can be sent via email to:\n- amministrazione@livasi.com\n- commerciale@livasi.com\nor via WhatsApp at:\n- +39 0963582222\nOur operators will respond as soon as possible.",b:false},{t:"3. Lead Times",b:true},{t:"Under normal conditions, orders are prepared in 1/2 working days. Shipments from Monday to Wednesday with standard delivery times of 2 working days in Italy.",b:false},{t:"4. Shipping Costs",b:true},{t:"For orders over 30kg, shipping is free only for delivery in Italy. For smaller loads or international shipping, costs are calculated in the invoice.",b:false},{t:"5. Payment Terms",b:true},{t:"- Advance Bank Transfer (goods will be shipped only after verification of payment receipt)",b:false},{t:"6. Receipt of Goods",b:true},{t:"Accept with 'subject to control'. Report any damage immediately on the courier's document and take photos. Claims without a signed reserve will not be accepted.",b:false}];
        const DISC_IT = "Il prezzo è da considerarsi escluso IVA. l’IVA indicata è valida per la fatturazione in Italia. Per la fatturazione estera verrà utilizzato il codice IVA relativa alla normativa di riferimento.";
        const DISC_EN = "Prices are to be considered VAT excluded. The indicated VAT is valid for invoicing in Italy. For international invoicing, specific VAT regulations will apply.";

        function App() {
            const [user, setUser] = useState(null);
            const [activeTab, setActiveTab] = useState('listino');
            const [products, setProducts] = useState([]);
            const [selectedProducts, setSelectedProducts] = useState([]);
            const [clientName, setClientName] = useState('');
            const [paymentMethod, setPaymentMethod] = useState(PAYMENT_METHODS[0]);
            const [listType, setListType] = useState('standard');
            const [pdfLanguage, setPdfLanguage] = useState('it');
            const [assets, setAssets] = useState({});
            const [isUploading, setIsUploading] = useState(null);
            const [isAddingProduct, setIsAddingProduct] = useState(false);
            const [searchQuery, setSearchQuery] = useState('');
            const [producerFilter, setProducerFilter] = useState('Tutti');
            const [editingProduct, setEditingProduct] = useState(null);
            const [editingListIndex, setEditingListIndex] = useState(null);
            const [isAnagraficaEdit, setIsAnagraficaEdit] = useState(false);
            const [globalDiscount, setGlobalDiscount] = useState(10);
            const [isLoading, setIsLoading] = useState(true);
            const [dbError, setDbError] = useState(null);
            const [stagingSelection, setStagingSelection] = useState([]);
            
            const initializedRef = useRef(false);

            useEffect(() => {
                const initAuth = async () => {
                    const timer = setInterval(async () => {
                        if (window.fb) {
                            clearInterval(timer);
                            const { auth, signInAnonymously, onAuthStateChanged, signInWithCustomToken, initialToken } = window.fb;
                            try {
                                if (initialToken) {
                                    try { await signInWithCustomToken(auth, initialToken); } 
                                    catch (e) { await signInAnonymously(auth); }
                                } else { await signInAnonymously(auth); }
                            } catch (err) { setDbError("Errore Firebase"); }
                            onAuthStateChanged(auth, (u) => { if (u) setUser(u); });
                        }
                    }, 100);
                    return () => clearInterval(timer);
                };
                initAuth();
            }, []);

            useEffect(() => {
                if (!user || !window.fb) return;
                const { db, collection, onSnapshot, setDoc, doc, appId } = window.fb;
                const assetsCol = collection(db, "artifacts", appId, "public", "data", "assets");
                const productsCol = collection(db, "artifacts", appId, "public", "data", "products");

                onSnapshot(assetsCol, (snap) => {
                    const a = {}; snap.forEach(d => a[d.id] = d.data().base64);
                    setAssets(a);
                }, (err) => setDbError("Permessi negati Assets"));

                onSnapshot(productsCol, (snap) => {
                    const p = []; snap.forEach(d => p.push({id: d.id, ...d.data()}));
                    setProducts(p);

                    const existingIds = p.map(x => x.id);
                    DEFAULT_PRODUCTS.forEach(async (item) => {
                        if (!existingIds.includes(item.id)) {
                            try { await setDoc(doc(productsCol, item.id), item); } catch(e) {}
                        }
                    });

                    if (!initializedRef.current && p.length > 0) {
                        const stdIds = DEFAULT_PRODUCTS.map(i => i.id);
                        const sorted = p.filter(i => stdIds.includes(i.id)).sort((a,b) => stdIds.indexOf(a.id) - stdIds.indexOf(b.id));
                        if (sorted.length > 0) {
                            setSelectedProducts(sorted.map(i => ({...i, discount: 10})));
                            initializedRef.current = true;
                        }
                    }
                    setIsLoading(false);
                }, (err) => { setDbError("Permessi negati Database"); setIsLoading(false); });
            }, [user]);

            const handleFileUpload = async (e, key) => {
                const file = e.target.files[0];
                if (!file || !user || !window.fb) return;
                setIsUploading(key);
                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new Image();
                    img.onload = async () => {
                        const canvas = document.createElement('canvas');
                        let w = img.width, h = img.height;
                        const MAX = 1200;
                        if (w > h) { if (w > MAX) { h *= MAX / w; w = MAX; } }
                        else { if (h > MAX) { w *= MAX / h; h = MAX; } }
                        canvas.width = w; canvas.height = h;
                        const ctx = canvas.getContext('2d');
                        ctx.fillStyle = "#FFFFFF"; ctx.fillRect(0,0,w,h);
                        ctx.drawImage(img, 0, 0, w, h);
                        const b64 = canvas.toDataURL('image/jpeg', 0.8);
                        const { db, setDoc, doc, appId } = window.fb;
                        try { await setDoc(doc(db, "artifacts", appId, "public", "data", "assets", key), { base64: b64 }); } catch(e) {}
                        setIsUploading(null);
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            };

            const generatePDF = async () => {
                if (!window.jspdf) return;
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();
                const isEn = pdfLanguage === 'en';
                const dateStr = new Date().toLocaleDateString('it-IT').replace(/\//g, '-');

                const renderHeader = (d) => {
                    if (assets.logoAziendale) d.addImage(assets.logoAziendale, 'JPEG', 20, 10, 35, 15);
                    d.setFontSize(10); d.setTextColor(180, 0, 0); d.setFont(undefined, 'bold');
                    d.text("Salumificio Livasì", 115, 17, { align: 'center' });
                    d.setFontSize(8); d.setTextColor(100, 100, 100); d.setFont(undefined, 'normal');
                    d.text("Loc. Livasì snc, 89864 Spilinga VV", 115, 22, { align: 'center' });
                    d.setDrawColor(220); d.line(20, 32, 190, 32);
                };

                const renderFooter = (d) => {
                    const ph = d.internal.pageSize.height;
                    d.setDrawColor(220); d.line(20, ph - 35, 190, ph - 35);
                    let x = 35;
                    for (let i = 1; i <= 5; i++) {
                        if (assets[`cert${i}`]) d.addImage(assets[`cert${i}`], 'JPEG', x, ph - 30, 25, 15);
                        x += 30;
                    }
                };

                doc.setFillColor(15, 15, 15); doc.rect(0, 0, 210, 297, 'F');
                if (assets.frontespizio) {
                    const dims = await new Promise(r => { const i = new Image(); i.onload = () => r({w:i.width, h:i.height}); i.src = assets.frontespizio; });
                    const drawH = 210 * (dims.h / dims.w);
                    doc.addImage(assets.frontespizio, 'JPEG', 0, (297 - drawH)/2, 210, drawH);
                }
                doc.setFillColor(0); doc.setGState(new doc.GState({opacity: 0.65}));
                doc.rect(0, 75, 210, 50, 'F'); doc.setGState(new doc.GState({opacity: 1}));
                doc.setTextColor(255); doc.setFontSize(32); doc.text("Salumificio Livasì", 105, 100, {align:'center'});
                doc.setFontSize(22); doc.text(isEn ? "PRICE LIST" : "LISTINO PREZZI", 105, 112, {align:'center'});
                
                doc.addPage(); renderHeader(doc);
                const cond = isEn ? CONDITIONS_EN : CONDITIONS_IT;
                let curY = 50; doc.setTextColor(40); doc.setFontSize(8);
                cond.forEach((s, idx) => { 
                    doc.setFont(undefined, s.b?'bold':'normal'); 
                    let text = s.t;
                    if (idx === 7 && s.t.includes("- ")) {
                        text = `- ${paymentMethod}`;
                    }
                    const lines = doc.splitTextToSize(text, 170); 
                    doc.text(lines, 20, curY); 
                    curY += (lines.length * 4.5) + 2; 
                });
                renderFooter(doc);

                doc.addPage(); renderHeader(doc);
                doc.setFontSize(14); doc.setFont(undefined, 'bold'); doc.text(isEn ? "DETAILED PRICE LIST" : "LISTINO PREZZI DETTAGLIATO", 105, 45, {align:'center'});
                const tableData = selectedProducts.map(p => {
                    const disc = (p.basePrice * (1 - (p.discount || 0) / 100)).toFixed(2);
                    return listType === 'standard' ? [p.code, p.name, p.weight, p.shelfLife, p.unit, p.vat+"%", p.basePrice.toFixed(2)+"€"] : [p.code, p.name, p.weight, p.shelfLife, p.unit, p.vat+"%", p.basePrice.toFixed(2)+"€", (p.discount||0)+"%", disc+"€"];
                });
                const head = isEn ? (listType==='standard'?["Code","Product","Weight","Shelf Life","U.M.","VAT","Price"]:["Code","Product","Weight","Shelf Life","U.M.","VAT","List","Disc.","Final"]) : (listType==='standard'?["Codice","Prodotto","Peso","Shelf Life","U.M.","IVA","Prezzo"]:["Codice","Prodotto","Peso","Shelf Life","U.M.","IVA","Listino","Sconto","Finale"]);
                doc.autoTable({ startY: 55, head: [head], body: tableData, theme: 'striped', headStyles: { fillColor: [180, 0, 0] }, styles: { fontSize: 7 } });
                renderFooter(doc); doc.save(`Listino_${clientName || 'Livasi'}.pdf`);
            };

            const producersList = useMemo(() => ['Tutti', ...new Set(products.map(p => p.producer || 'Salumificio Livasì'))], [products]);
            const filteredForAdd = useMemo(() => products.filter(p => (p.name.toLowerCase().includes(searchQuery.toLowerCase()) || p.code.toLowerCase().includes(searchQuery.toLowerCase())) && (producerFilter === 'Tutti' || (p.producer || 'Salumificio Livasì') === producerFilter)), [products, searchQuery, producerFilter]);

            const toggleStaging = (product) => {
                if (stagingSelection.find(p => p.id === product.id)) {
                    setStagingSelection(stagingSelection.filter(p => p.id !== product.id));
                } else {
                    // Aggiunge con sconto predefinito del 10% per coerenza
                    setStagingSelection([...stagingSelection, { ...product, discount: 10 }]);
                }
            };

                setSelectedProducts([...selectedProducts, ...stagingSelection]);
                setStagingSelection([]);
                setIsAddingProduct(false);
            };

            const handleInlineDiscountChange = (index, val) => {
                const disc = parseFloat(val) || 0;
                const newList = [...selectedProducts];
                newList[index] = { ...newList[index], discount: disc };
                setSelectedProducts(newList);
            };

            const saveProductToAnagrafica = async (p) => {
                if (!user || !window.fb) return;
                const { db, setDoc, doc, appId } = window.fb;
                const pId = p.id || crypto.randomUUID();
                try {
                    await setDoc(doc(db, "artifacts", appId, "public", "data", "products", pId), { ...p, id: pId });
                } catch(e) { console.error("Salvataggio fallito:", e); }
                setIsAnagraficaEdit(false); setEditingProduct(null);
            };

            if (isLoading) return <div className="min-h-screen flex flex-col items-center justify-center bg-white gap-6"><div className="w-16 h-16 border-4 border-slate-100 border-t-red-600 rounded-full animate-spin"></div><div className="text-center"><p className="font-black text-slate-400 text-sm uppercase tracking-widest uppercase">Sincronizzazione Database...</p></div></div>;

            return (
                <div className="min-h-screen pb-24 font-sans bg-slate-50 text-slate-800 animate-fade-in">
                    <header className="bg-white border-b p-4 flex justify-between items-center sticky top-0 z-50 shadow-sm">
                        <div className="flex items-center gap-2"><div className="w-10 h-10 bg-red-700 rounded-xl flex items-center justify-center text-white font-black shadow-lg text-white text-lg">L</div><h1 className="font-black uppercase tracking-tighter text-lg leading-none uppercase">Livasì Manager</h1></div>
                        <div className="flex gap-2">
                            <button onClick={() => setActiveTab('listino')} className={`p-3 rounded-xl transition-all ${activeTab==='listino'?'bg-red-50 text-red-700 shadow-inner':'text-slate-400 hover:bg-slate-50'}`}><svg width="20" height="20" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></svg></button>
                            <button onClick={() => setActiveTab('anagrafica')} className={`p-3 rounded-xl transition-all ${activeTab==='anagrafica'?'bg-red-50 text-red-700 shadow-inner':'text-slate-400 hover:bg-slate-50'}`}><svg width="20" height="20" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></button>
                        </div>
                    </header>

                    <main className="p-4 max-w-2xl mx-auto space-y-6">
                        {activeTab === 'listino' ? (
                            <div className="space-y-6 animate-fade-in">
                                <section className="bg-white p-6 rounded-3xl shadow-sm border border-slate-200 space-y-4 text-left">
                                    <div className="space-y-1"><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Cliente</label><input type="text" className="w-full p-2 border-b font-bold text-lg outline-none focus:border-red-500 bg-transparent transition-all" value={clientName} onChange={e => setClientName(e.target.value)} placeholder="Salumeria Rossi..." /></div>
                                    <div className="grid grid-cols-2 gap-2">
                                        <div className="flex bg-slate-100 p-1 rounded-xl"><button onClick={()=>setListType('standard')} className={`flex-1 py-1.5 text-[10px] font-black rounded-lg ${listType==='standard'?'bg-white text-red-700 shadow-sm':'text-slate-400'}`}>STANDARD</button><button onClick={()=>setListType('discount')} className={`flex-1 py-1.5 text-[10px] font-black rounded-lg ${listType==='discount'?'bg-white text-red-700 shadow-sm':'text-slate-400'}`}>SCONTO</button></div>
                                        <div className="flex bg-slate-100 p-1 rounded-xl"><button onClick={()=>setPdfLanguage('it')} className={`flex-1 py-1.5 text-[10px] font-black rounded-lg ${pdfLanguage==='it'?'bg-white text-red-700 shadow-sm':'text-slate-400'}`}>ITALIANO</button><button onClick={()=>setPdfLanguage('en')} className={`flex-1 py-1.5 text-[10px] font-black rounded-lg ${pdfLanguage==='en'?'bg-white text-blue-700 shadow-sm':'text-slate-400'}`}>ENGLISH</button></div>
                                    </div>
                                    <div className="space-y-1"><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Metodo Pagamento</label><select value={paymentMethod} onChange={(e) => setPaymentMethod(e.target.value)} className="w-full p-3 bg-slate-50 border border-slate-200 rounded-2xl outline-none font-bold text-sm">{PAYMENT_METHODS.map(m => <option key={m} value={m}>{m}</option>)}</select></div>
                                </section>

                                <div className="space-y-3">
                                    <div className="flex justify-between items-center px-2"><h2 className="text-xs font-black uppercase text-slate-400 tracking-widest">Articoli Listino ({selectedProducts.length})</h2><button onClick={()=>{setIsAddingProduct(true); setSearchQuery(''); setStagingSelection([]);}} className="p-2 bg-slate-900 text-white rounded-lg active:scale-95 shadow-lg"><svg width="18" height="18" fill="none" stroke="currentColor" strokeWidth="3" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button></div>
                                    {selectedProducts.map((p, i) => {
                                        // Visualizzazione dinamica del prezzo basata sul tipo di listino
                                        const displayPrice = listType === 'standard' ? p.basePrice : (p.basePrice * (1 - (p.discount || 0) / 100));
                                        return (
                                            <div key={i} className="bg-white p-4 rounded-2xl border border-slate-100 flex justify-between items-center shadow-sm animate-fade-in text-left">
                                                <div className="flex-1 min-w-0">
                                                    <div className="flex items-center gap-2 mb-1"><span className="text-[10px] font-bold text-red-600 uppercase bg-red-50 px-1.5 rounded tracking-tighter">{p.code}</span><h3 className="font-bold truncate text-sm leading-tight uppercase">{p.name}</h3></div>
                                                    <div className="flex items-center gap-3"><p className="text-[11px] text-slate-400 italic leading-none">{p.weight} • <span className="font-bold text-slate-900 not-italic">{displayPrice.toFixed(2)}€</span></p>
                                                    {listType === 'discount' && <div className="flex items-center gap-1 bg-blue-50 px-2 py-0.5 rounded-full border border-blue-100 ml-1"><input type="number" value={p.discount} onChange={e => handleInlineDiscountChange(i, e.target.value)} className="w-8 bg-transparent text-[10px] font-bold text-blue-600 text-center outline-none" />%</div>}</div>
                                                </div>
                                                <div className="flex gap-1 ml-4 transition-all">
                                                    <button onClick={() => { setEditingProduct({...p}); setEditingListIndex(i); setIsAddingProduct(true); }} className="p-2 text-slate-300 hover:text-blue-600"><svg width="18" height="18" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.121 12 15l-4 1 1-4 9.5-9.5z"/></svg></button>
                                                    <button onClick={() => setSelectedProducts(selectedProducts.filter((_, idx) => idx !== i))} className="p-2 text-slate-300 hover:text-red-600 transition-colors"><svg width="18" height="18" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></button>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                                <button onClick={generatePDF} className="fixed bottom-8 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-10 py-4 rounded-full font-black shadow-2xl active:scale-95 transition-all text-sm uppercase tracking-widest flex items-center gap-3 z-40">GENERA PDF</button>
                            </div>
                        ) : (
                            <div className="space-y-8 animate-fade-in pb-24">
                                <section className="bg-white p-6 rounded-3xl shadow-sm border border-slate-200 space-y-6 text-left">
                                    <h2 className="font-black text-xs uppercase tracking-widest text-slate-400 uppercase tracking-widest">Asset Grafici</h2>
                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                        {LOGO_KEYS.map(({ key, label }) => (
                                            <div key={key} className="p-4 bg-slate-50 border border-slate-100 rounded-3xl flex flex-col gap-3">
                                                <div className="flex justify-between items-center"><span className="text-[10px] font-bold text-slate-400 uppercase">{label}</span>{isUploading === key ? <div className="animate-spin h-3 w-3 border-2 border-red-700 border-t-transparent rounded-full"></div> : assets[key] ? <span className="text-green-600 text-xs font-bold uppercase">✓ Ok</span> : null}</div>
                                                <label className="cursor-pointer bg-white border border-slate-200 text-center py-2 rounded-xl text-[10px] font-black uppercase hover:bg-slate-100 transition-all tracking-widest">{assets[key] ? 'Sostituisci' : 'Carica'}<input type="file" className="hidden" accept="image/*" onChange={e => handleFileUpload(e, key)} /></label>
                                            </div>
                                        ))}
                                    </div>
                                </section>
                                <section className="space-y-4">
                                    <div className="flex justify-between items-center px-2"><h2 className="text-xs font-black uppercase text-slate-400 uppercase tracking-widest text-slate-400 uppercase">Anagrafica Database</h2><button onClick={() => { setEditingProduct({code:'', name:'', cost:0, vat:10, producer:'Salumificio Livasì', unit:'Kg', weight:'', shelfLife:'180 gg', basePrice:0}); setIsAnagraficaEdit(true); }} className="p-2 bg-slate-900 text-white rounded-lg shadow-lg active:scale-95"><svg width="18" height="18" fill="none" stroke="currentColor" strokeWidth="3" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button></div>
                                    <div className="grid grid-cols-1 gap-3 text-left">
                                        {products.map(p => (
                                            <div key={p.id} className="bg-white p-5 rounded-3xl border border-slate-100 shadow-sm flex flex-col gap-3 group animate-fade-in hover:border-red-200 transition-all">
                                                <div className="flex justify-between items-start text-left">
                                                    <span className="text-[10px] font-black bg-slate-100 text-slate-500 px-3 py-1 rounded-full uppercase tracking-widest tracking-tighter">{p.code}</span>
                                                    <div className="flex gap-2"><button onClick={() => { setEditingProduct({...p}); setIsAnagraficaEdit(true); }} className="text-blue-600 p-1 hover:bg-blue-50 rounded-lg transition-all"><svg width="16" height="16" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.121 12 15l-4 1 1-4 9.5-9.5z"/></svg></button></div>
                                                </div>
                                                <h3 className="font-black text-slate-800 leading-tight text-sm uppercase">{p.name}</h3>
                                                <p className="text-[9px] font-bold text-slate-400 uppercase tracking-widest">Fornitore: {p.producer || 'Livasì'}</p>
                                            </div>
                                        ))}
                                    </div>
                                </section>
                            </div>
                        )}
                    </main>

                    {/* MODALE EDITOR ANAGRAFICA COMPLETO */}
                    {isAnagraficaEdit && editingProduct && (
                        <div className="fixed inset-0 z-[110] bg-slate-900/90 backdrop-blur-xl flex items-center justify-center p-4 animate-fade-in">
                            <div className="bg-white w-full max-w-2xl rounded-[3rem] shadow-2xl flex flex-col max-h-[90vh] text-left">
                                <div className="p-8 border-b border-slate-50 flex justify-between items-center"><h3 className="font-black text-slate-800 text-xl uppercase tracking-tighter uppercase tracking-widest">Dati Prodotto</h3><button onClick={() => { setIsAnagraficaEdit(false); setEditingProduct(null); }} className="p-2 border border-slate-100 rounded-full transition-all hover:bg-slate-50"><svg width="20" height="20" fill="none" stroke="currentColor" strokeWidth="3" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div>
                                <div className="p-8 overflow-y-auto grid grid-cols-1 md:grid-cols-2 gap-6 custom-scroll">
                                    <div className="md:col-span-2 space-y-1"><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest uppercase">Nome Articolo</label><input type="text" value={editingProduct.name} onChange={e => setEditingProduct({...editingProduct, name: e.target.value})} className="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl outline-none focus:ring-2 focus:ring-red-500 font-bold text-left" /></div>
                                    <div className="space-y-1"><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest uppercase">Codice</label><input type="text" value={editingProduct.code} onChange={e => setEditingProduct({...editingProduct, code: e.target.value})} className="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl font-bold outline-none text-left" /></div>
                                    <div className="space-y-1"><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest uppercase">Fornitore/Produttore</label><input type="text" value={editingProduct.producer} onChange={e => setEditingProduct({...editingProduct, producer: e.target.value})} className="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl font-bold outline-none text-left" /></div>
                                    <div className="space-y-1"><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest uppercase">Peso (es. 1,5kg a 3kg)</label><input type="text" value={editingProduct.weight} onChange={e => setEditingProduct({...editingProduct, weight: e.target.value})} className="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl font-bold outline-none text-left" /></div>
                                    <div className="space-y-1"><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest uppercase">Shelf Life (es. 180 gg)</label><input type="text" value={editingProduct.shelfLife} onChange={e => setEditingProduct({...editingProduct, shelfLife: e.target.value})} className="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl font-bold outline-none text-left" /></div>
                                    <div className="space-y-1"><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest uppercase">IVA %</label><input type="number" value={editingProduct.vat} onChange={e => setEditingProduct({...editingProduct, vat: parseInt(e.target.value)||0})} className="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl font-bold outline-none text-left" /></div>
                                    <div className="space-y-1"><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest uppercase">U.M. (Kg/Pz)</label><input type="text" value={editingProduct.unit} onChange={e => setEditingProduct({...editingProduct, unit: e.target.value})} className="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl font-bold outline-none text-left" /></div>
                                    <div className="space-y-1"><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest uppercase">Costo Produzione (€)</label><input type="number" step="0.01" value={editingProduct.cost} onChange={e => setEditingProduct({...editingProduct, cost: parseFloat(e.target.value)||0})} className="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl font-bold outline-none text-left" /></div>
                                    <div className="space-y-1 md:col-span-2"><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest uppercase text-red-600">Prezzo Listino Base (€)</label><input type="number" step="0.01" value={editingProduct.basePrice} onChange={e => setEditingProduct({...editingProduct, basePrice: parseFloat(e.target.value)||0})} className="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl font-bold text-red-600 outline-none focus:ring-2 focus:ring-red-500 text-left" /></div>
                                </div>
                                <div className="p-8 border-t bg-slate-50/50 flex gap-4"><button onClick={() => { setIsAnagraficaEdit(false); setEditingProduct(null); }} className="flex-1 py-4 border border-slate-200 rounded-2xl font-black text-slate-500 uppercase tracking-widest active:scale-95 transition-all uppercase">Annulla</button><button onClick={() => saveProductToAnagrafica(editingProduct)} className="flex-1 py-4 bg-red-700 text-white rounded-2xl font-black shadow-xl uppercase active:scale-95 transition-all tracking-widest uppercase text-white">Salva Prodotto</button></div>
                            </div>
                        </div>
                    )}
                    
                    {isAddingProduct && !isAnagraficaEdit && (
                        <div className="fixed inset-0 z-[100] bg-slate-900/90 backdrop-blur-xl flex items-end md:items-center justify-center p-0 md:p-6 animate-fade-in">
                            <div className="bg-white w-full max-w-xl rounded-t-[3rem] md:rounded-[3.5rem] p-8 space-y-6 shadow-2xl overflow-y-auto max-h-[95vh] relative text-left">
                                <button onClick={() => { setIsAddingProduct(false); setEditingProduct(null); setEditingListIndex(null); setStagingSelection([]); }} className="absolute right-6 top-6 p-2 hover:bg-slate-100 rounded-full transition-all hover:bg-slate-50"><svg width="24" height="24" fill="none" stroke="currentColor" strokeWidth="3" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
                                
                                {editingProduct && editingListIndex !== null ? (
                                    <div className="space-y-6 animate-fade-in py-4 text-left">
                                        <div className="bg-red-700 p-6 rounded-[2.5rem] text-white relative shadow-2xl overflow-hidden uppercase">
                                            <h4 className="font-black text-xl leading-tight">{editingProduct.name}</h4>
                                            <p className="text-[10px] font-black text-red-200 mt-1 tracking-widest">{editingProduct.code} • {editingProduct.producer}</p>
                                        </div>
                                        <div className="grid grid-cols-2 gap-4">
                                            <div className="space-y-2"><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest uppercase ml-1">Prezzo Listino (€)</label><input type="number" step="0.01" className="w-full p-4 bg-slate-100 border-none rounded-2xl font-black text-xl text-red-700 outline-none text-left" value={editingProduct.basePrice} onChange={e => setEditingProduct({...editingProduct, basePrice: parseFloat(e.target.value)||0})} /></div>
                                            <div className="space-y-2"><label className="text-[10px] font-black text-blue-500 uppercase ml-1 block">Sconto (%)</label><input type="number" className="w-full p-4 bg-blue-50 border-none rounded-2xl font-black text-xl text-blue-700 outline-none text-center" value={editingProduct.discount} onChange={e => setEditingProduct({...editingProduct, discount: parseFloat(e.target.value)||0})} /></div>
                                        </div>
                                        <button onClick={() => {
                                            const nl=[...selectedProducts]; nl[editingListIndex] = editingProduct; setSelectedProducts(nl);
                                            setIsAddingProduct(false); setEditingProduct(null); setEditingListIndex(null);
                                        }} className="w-full bg-slate-900 text-white py-5 rounded-2xl font-black uppercase tracking-widest shadow-2xl active:scale-95 transition-all">CONFERMA MODIFICA</button>
                                    </div>
                                ) : (
                                    <div className="space-y-6 animate-fade-in text-left">
                                        <div className="text-center">
                                            <h3 className="font-black uppercase tracking-widest text-sm text-slate-800">Selezione Multipla</h3>
                                            <p className="text-[10px] text-slate-400 mt-1 uppercase">Seleziona gli articoli dal database</p>
                                        </div>
                                        <div className="flex gap-2">
                                            <input type="text" className="flex-1 p-4 bg-slate-100 border-none rounded-2xl outline-none font-bold shadow-inner text-sm text-left" placeholder="Cerca per nome o codice..." value={searchQuery} onChange={e => setSearchQuery(e.target.value)} />
                                            <select className="bg-slate-100 border-none rounded-2xl px-3 py-4 outline-none font-bold text-[10px] uppercase" value={producerFilter} onChange={e => setProducerFilter(e.target.value)}>{producersList.map(p => <option key={p} value={p}>{p}</option>)}</select>
                                        </div>
                                        <div className="space-y-2 max-h-[45vh] overflow-y-auto custom-scroll pr-2 text-left">
                                            {filteredForAdd.map(p => {
                                                const isSelected = stagingSelection.find(s => s.id === p.id);
                                                return (
                                                    <button key={p.id} onClick={() => toggleStaging(p)} className={`w-full flex items-center justify-between p-4 border-2 rounded-2xl transition-all ${isSelected ? 'border-red-500 bg-red-50/50 shadow-md translate-x-1' : 'border-slate-100 bg-white hover:border-slate-300'}`}>
                                                        <div className="min-w-0">
                                                            <p className={`text-[9px] font-black uppercase mb-1 tracking-tighter ${isSelected ? 'text-red-600' : 'text-slate-400'}`}>{p.code} • {p.producer}</p>
                                                            <h4 className={`font-black text-sm uppercase truncate ${isSelected ? 'text-red-800' : 'text-slate-800'}`}>{p.name}</h4>
                                                        </div>
                                                        <div className={`w-6 h-6 rounded-full flex items-center justify-center transition-all ${isSelected ? 'bg-red-600 text-white' : 'bg-slate-100 text-slate-300'}`}>
                                                            {isSelected ? <svg width="14" height="14" fill="none" stroke="currentColor" strokeWidth="4" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg> : <svg width="14" height="14" fill="none" stroke="currentColor" strokeWidth="4" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>}
                                                        </div>
                                                    </button>
                                                );
                                            })}
                                        </div>
                                        <div className="pt-2">
                                            <button onClick={addStagingToMain} disabled={stagingSelection.length === 0} className={`w-full py-5 rounded-2xl font-black uppercase tracking-widest shadow-2xl transition-all flex items-center justify-center gap-3 ${stagingSelection.length > 0 ? 'bg-slate-900 text-white active:scale-95' : 'bg-slate-200 text-slate-400 cursor-not-allowed'}`}>
                                                AGGIUNGI {stagingSelection.length > 0 ? stagingSelection.length : ''} ARTICOLI
                                            </button>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
